      url: "https://www.jair.org/index.php/jair/article/view/17036"
    - label: "Code"
      url: "https://github.com/Ludvins/2024_PAC-Chernoff-Bound"

- id: "pac-bayes-chernoff"
  title: "PAC-Bayes-Chernoff Bounds for Unbounded Losses"
  year: "2024"
  authors: "Ioar Casado, Luis A. Ortega, Aritz Perez, Andres R. Masegosa"
  venue: "NeurIPS 2024"
  summary: "Extends Cramer-Chernoff style bounds to PAC-Bayesian settings with unbounded losses."
  abstract: |
    We introduce a new PAC-Bayes oracle bound for unbounded losses that extends
    Cram&eacute;r-Chernoff bounds to the PAC-Bayesian setting. The proof technique relies on
    controlling the tails of certain random variables involving the Cram&eacute;r transform
    of the loss. Our approach naturally leverages properties of Cram&eacute;r-Chernoff
    bounds, such as exact optimization of the free parameter in many PAC-Bayes bounds. We
    highlight several applications of the main theorem. Firstly, we show that our bound
    recovers and generalizes previous results. Additionally, our approach allows working
    with richer assumptions that result in more informative and potentially tighter bounds.
    In this direction, we provide a general bound under a new model-dependent assumption
    from which we obtain bounds based on parameter norms and log-Sobolev inequalities.
    Notably, many of these bounds can be minimized to obtain distributions beyond the Gibbs
    posterior and provide novel theoretical coverage to existing regularization techniques.
  tags: ["bounds", "bayesian-dl", "pac-bayes", "unbounded", "losses"]
  labels: ["PAC-Bayes", "Bounds", "Unbounded loss"]
  search: "pac bayes chernoff bounds unbounded losses neurips"
  accent: "olive"
  links:
    - label: "PDF"
      url: "https://openreview.net/forum?id=CyzZeND3LB"

- id: "variational-linearized-laplace"
  title: "Variational Linearized Laplace Approximation for Bayesian Deep Learning"
  year: "2024"
  authors: "Luis A. Ortega, Simon Rodriguez-Santana, Daniel Hernandez-Lobato"
  venue: "ICML 2024"
  summary: |
    Approximates LLA via sparse variational Gaussian processes with sub-linear training
    costs.
  abstract: |
    The Linearized Laplace Approximation (LLA) has been recently used to perform uncertainty
    estimation on the predictions of pre-trained deep neural networks (DNNs). However, its
    widespread application is hindered by significant computational costs, particularly in
    scenarios with a large number of training points or DNN parameters. Consequently,
    additional approximations of LLA, such as Kronecker-factored or diagonal approximate GGN
    matrices, are utilized, potentially compromising the model's performance. To address
    these challenges, we propose a new method for approximating LLA using a variational
    sparse Gaussian Process (GP). Our method is based on the dual RKHS formulation of GPs
    and retains, as the predictive mean, the output of the original DNN. Furthermore, it
    allows for efficient stochastic optimization, which results in sub-linear training time
    in the size of the training dataset. Specifically, its training cost is independent of
    the number of training points. We compare our proposed method against accelerated LLA
    (ELLA), which relies on the Nystr&ouml;m approximation, as well as other LLA variants
    employing the sample-then-optimize principle. Experimental results, both on regression
    and classification datasets, show that our method outperforms these already existing
    efficient variants of LLA, both in terms of the quality of the predictive distribution
    and in terms of total computational time.
  tags: ["bayesian-dl", "inference", "code", "variational", "gp", "laplace"]
  labels: ["Bayesian DL", "Variational GP", "LLA", "Code"]
  search: "variational linearized laplace approximation bayesian deep learning icml code"
  accent: "olive"
  links:
    - label: "PDF"
      url: "https://proceedings.mlr.press/v235/ortega24a.html"
    - label: "Code"
      url: "https://github.com/Ludvins/Variational-LLA"

- id: "cold-posterior-effect"
  title: "The Cold Posterior Effect Indicates Underfitting"
  year: "2024"
  authors: "Yijie Zhang, Yi-Shan Wu, Luis A. Ortega, Andres R. Masegosa"
  venue: "TMLR 2024"
  summary: |
    Reframes the cold posterior effect as evidence of underfitting in misspecified Bayesian
    posteriors.
  abstract: |
    The cold posterior effect (CPE) (Wenzel et al., 2020) in Bayesian deep learning shows
    that, for posteriors with a temperature T&lt;1, the resulting posterior predictive could
    have better performance than the Bayesian posterior (T=1). As the Bayesian posterior is
    known to be optimal under perfect model specification, many recent works have studied
    the presence of CPE as a model misspecification problem, arising from the prior and/or
    from the likelihood. In this work, we provide a more nuanced understanding of the CPE as
    we show that misspecification leads to CPE only when the resulting Bayesian posterior
    underfits. In fact, we theoretically show that if there is no underfitting, there is no
    CPE. Furthermore, we show that these tempered posteriors with (T&lt;1) are indeed proper
    Bayesian posteriors with a different combination of likelihood and prior parameterized
    by T. This observation validates the adjustment of the temperature hyperparameter T as a
    straightforward approach to mitigate underfitting in the Bayesian posterior. In essence,
    we show that by fine-tuning the temperature T we implicitly utilize alternative Bayesian
    posteriors, albeit with less misspecified likelihood and prior distributions.
  tags: ["bayesian-dl", "code", "posterior", "underfitting"]
  labels: ["Bayesian DL", "Posterior", "Underfitting", "Code"]
  search: "cold posterior effect indicates underfitting tmlr code"
  accent: "olive"
  links:
    - label: "PDF"
      url: "https://openreview.net/forum?id=GZORXGxHHT"
    - label: "Code"
      url: "https://github.com/pyijiezhang/cpe-underfit"

- id: "deep-variational-implicit-processes"
  title: "Deep Variational Implicit Processes"
  year: "2023"
  authors: "Luis A. Ortega, Simon Rodriguez-Santana, Daniel Hernandez-Lobato"
  venue: "ICLR 2023"
  summary: "A multi-layer implicit-process generalization for flexible function-space inference."
  abstract: |
    Implicit processes (IPs) are a generalization of Gaussian processes (GPs). IPs may lack
    a closed-form expression but are easy to sample from. Examples include, among others,
    Bayesian neural networks or neural samplers. IPs can be used as priors over functions,
    resulting in flexible models with well-calibrated prediction uncertainty estimates.
    Methods based on IPs usually carry out function-space approximate inference, which
    overcomes some of the difficulties of parameter-space approximate inference.
    Nevertheless, the approximations employed often limit the expressiveness of the final
    model, resulting, e.g., in a Gaussian predictive distribution, which can be restrictive.
    We propose here a multi-layer generalization of IPs called the Deep Variational Implicit
    process (DVIP). This generalization is similar to that of deep GPs over GPs, but it is
    more flexible due to the use of IPs as the prior distribution over the latent functions.
    We describe a scalable variational inference algorithm for training DVIP and show that
    it outperforms previous IP-based methods and also deep GPs. We support these claims via
    extensive regression and classification experiments. We also evaluate DVIP on large
    datasets with up to several million data instances to illustrate its good scalability
    and performance.
  tags: ["bayesian-dl", "inference", "code", "implicit", "processes"]
  labels: ["DVIP", "Implicit Processes", "Inference", "Code"]
  search: "deep variational implicit processes iclr code"
  accent: "olive"
  links:
    - label: "PDF"
      url: "https://openreview.net/forum?id=8aeSJNbmbQq"
    - label: "Code"
      url: "https://github.com/Ludvins/2023-ICLR-DVIP"

- id: "diversity-generalization-ensembles"
  title: "Diversity and Generalization in Neural Network Ensembles"
  year: "2022"
  authors: "Luis A. Ortega, Rafael Cabanas, Andres R. Masegosa"
  venue: "AISTATS 2022"
  summary: |
    Connects ensemble diversity, generalization error, and common model-combination
    strategies.
  abstract: |
    Ensembles are widely used in machine learning and, usually, provide state-of-the-art
    performance in many prediction tasks. From the very beginning, the diversity of an
    ensemble has been identified as a key factor for the superior performance of these
    models. But the exact role that diversity plays in ensemble models is poorly understood,
    specially in the context of neural networks. In this work, we combine and expand
    previously published results in a theoretically sound framework that describes the
    relationship between diversity and ensemble performance for a wide range of ensemble
    methods. More precisely, we provide sound answers to the following questions: how to
    measure diversity, how diversity relates to the generalization error of an ensemble, and
    how diversity is promoted by neural network ensemble algorithms. This analysis covers
    three widely used loss functions, namely, the squared loss, the cross-entropy loss, and
    the 0-1 loss; and two widely used model combination strategies, namely, model averaging
    and weighted majority vote. We empirically validate this theoretical analysis with
    neural network ensembles.
  tags: ["bayesian-dl", "code", "ensembles", "generalization"]
  labels: ["Ensembles", "Diversity", "Generalization", "Code"]
  search: "diversity and generalization neural network ensembles aistats code"
  accent: "olive"
  links:
