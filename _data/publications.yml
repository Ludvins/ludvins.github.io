      url: "https://github.com/Ludvins/BayesiPy"

- id: "quadratic-linearized-laplace"
  title: "Improving the Linearized Laplace Approximation via Quadratic Approximations"
  year: "2026"
  authors: "Pedro Jimenez, Luis A. Ortega, Pablo Morales-Alvarez, Daniel Hernandez-Lobato"
  venue: "ESANN 2026"
  summary: |
    Rank-one quadratic factors improve fidelity to the full Laplace posterior while keeping
    prediction linearized.
  abstract: |
    Deep neural networks (DNNs) often produce overconfident out-of-distribution predictions,
    motivating Bayesian uncertainty quantification. The Linearized Laplace Approximation
    (LLA) achieves this by linearizing the DNN and applying Laplace inference to the
    resulting model. Importantly, the linear model is also used for prediction. We argue
    this linearization in the posterior may degrade fidelity to the true Laplace
    approximation. To alleviate this problem, without increasing significantly the
    computational cost, we propose the Quadratic Laplace Approximation (QLA). QLA
    approximates each second order factor in the approximate Laplace log-posterior using a
    rank-one factor obtained via efficient power iterations. QLA is expected to yield a
    posterior precision closer to that of the full Laplace without forming the full Hessian,
    which is typically intractable. For prediction, QLA also uses the linearized model.
    Empirically, QLA yields modest yet consistent uncertainty estimation improvements over
    LLA on five regression datasets.
  tags: ["bayesian-dl", "inference", "laplace", "regression"]
  labels: ["QLA", "Laplace", "Regression"]
  search: "improving linearized laplace approximation quadratic approximations esann qla"
  accent: "oxblood"

- id: "sgd-implicit-bias"
  title: "A Large Deviation Theory Analysis on the Implicit Bias of SGD"
  year: "2026"
  authors: "Luis A. Ortega, Andres R. Masegosa"
  venue: "Neurocomputing 2026"
  summary: |
    Uses large-deviation theory to explain why mini-batch SGD may prefer better-concentrated
    solutions.
  abstract: |
    Stochastic Gradient Descent (SGD) is the primary optimization method used in deep
    learning, yet the reasons behind its ability to select models that generalize
    effectively remain unclear. This paper develops a new perspective based on Large
    Deviation Theory (LDT). We show that the generalization error can be decomposed into
    three terms: the expected loss, a component that reflects the concentration of the
    empirical loss around its mean, and a component that captures the abnormality of
    deviations arising from stochastic sampling. This decomposition highlights a key
    difference between optimization methods: while full-batch Gradient Descent tends to
    exploit poorly concentrated and abnormal fluctuations&mdash;often leading to
    overfitting&mdash;mini-batch SGD naturally biases the search towards models with tighter
    concentration and fewer abnormal deviations. The analysis relies on standard assumptions
    such as i.i.d data and smooth loss functions. Experiments with deep convolutional
    networks support the theoretical findings, showing that smaller batch sizes and l2
    regularization reinforce the preference for models with smaller generalization error.
    These results position LDT as a useful tool for understanding implicit regularization in
    SGD and suggest directions for extending this perspective to broader machine learning
    settings.
  tags: ["bounds", "code", "generalization", "sgd", "ldt"]
  labels: ["SGD", "LDT", "Generalization", "Code"]
  search: "large deviation theory analysis implicit bias sgd neurocomputing code"
  accent: "oxblood"
  links:
    - label: "Code"
      url: "https://github.com/Ludvins/sgd-implicit-bias-ldt"

- id: "pac-chernoff-bounds"
  title: "PAC-Chernoff Bounds: Understanding Generalization in the Interpolation Regime"
  year: "2025"
  authors: "Andres R. Masegosa, Luis A. Ortega"
  venue: "JAIR &middot; ECAI 2025 Spotlight"
  summary: |
    A distribution-dependent PAC-Chernoff bound and smoothness framework for
    over-parameterized interpolators.
  abstract: |
    This paper introduces a distribution-dependent PAC-Chernoff bound that exhibits perfect
    tightness for interpolators, even within over-parameterized model classes. This bound,
    which relies on basic principles of Large Deviation Theory, defines a natural measure of
    the smoothness of a model, characterized by simple real-valued functions. Building upon
    this bound and the new concept of smoothness, we present an unified theoretical
    framework revealing why certain interpolators show an exceptional generalization, while
    others falter. We theoretically show how a wide spectrum of modern learning
    methodologies, encompassing techniques such as l2-norm, distance-from-initialization and
    input-gradient regularization, in combination with data augmentation, invariant
    architectures, and over-parameterization, collectively guide the optimizer toward
    smoother interpolators, which, according to our theoretical framework, are the ones
    exhibiting superior generalization performance. This study shows that
    distribution-dependent bounds serve as a powerful tool to understand the complex
    dynamics behind the generalization capabilities of over-parameterized interpolators.
  tags: ["bounds", "code", "generalization", "pac-chernoff", "interpolation"]
  labels: ["PAC-Chernoff", "Interpolation", "Bounds", "Code"]
  search: "pac chernoff bounds understanding generalization interpolation regime jair ecai spotlight"
  accent: "oxblood"
  links:
