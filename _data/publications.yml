      url: "https://proceedings.mlr.press/v151/ortega22a.html"
    - label: "Code"
      url: "https://github.com/PGM-Lab/2022-AISTATS-diversity"

- id: "sparse-implicit-processes"
  title: "Correcting Model Bias with Sparse Implicit Processes"
  year: "2022"
  authors: "Simon Rodriguez-Santana, Luis A. Ortega, Daniel Hernandez-Lobato, Bryan Zaldivar"
  venue: "ICML Workshop 2022"
  summary: |
    Shows sparse implicit processes can correct model bias when the assumed mechanism
    differs from the data.
  abstract: |
    Model selection in machine learning (ML) is a crucial part of the Bayesian learning
    procedure. Model choice may impose strong biases on the resulting predictions, which can
    hinder the performance of methods such as Bayesian neural networks and neural samplers.
    On the other hand, newly proposed approaches for Bayesian ML exploit features of
    approximate inference in function space with implicit stochastic processes (a
    generalization of Gaussian processes). The approach of Sparse Implicit Processes (SIP)
    is particularly successful in this regard, since it is fully trainable and achieves
    flexible predictions. Here, we expand on the original experiments to show that SIP is
    capable of correcting model bias when the data generating mechanism differs strongly
    from the one implied by the model. We use synthetic datasets to show that SIP is capable
    of providing predictive distributions that reflect the data better than the exact
    predictions of the initial, but wrongly assumed model.
  tags: ["bayesian-dl", "inference", "code", "implicit", "processes"]
  labels: ["SIP", "Implicit Processes", "Inference", "Code"]
  search: "correcting model bias sparse implicit processes icml workshop code"
  accent: "olive"
  links:
    - label: "PDF"
      url: "https://arxiv.org/abs/2207.10673"
    - label: "Code"
      url: "https://github.com/simonrsantana/sparse-implicit-processes"

- id: "flow-transformed-implicit-processes"
  title: "Flow-Transformed Implicit Processes for Function-Space Variational Inference"
  year: "ongoing"
  authors: "Luis A. Ortega, Andrés R. Masegosa, Thomas D. Nielsen"
  venue: "arXiv 2026"
  summary: |
    Uses normalizing flows over finite sampled-function combinations to enrich
    function-space variational inference with implicit-process priors.
  abstract: |
    Implicit-process priors define distributions over functions through flexible generative
    mechanisms, making them attractive for Bayesian function-space modelling. However,
    performing posterior inference with such priors is challenging because their induced
    function-space distributions are typically not available in closed form. One practical
    strategy is to approximate the prior using a finite collection of sampled functions, and
    then represent posterior functions as learned combinations of these samples. Existing
    approaches commonly place a Gaussian variational distribution over the combination
    weights. While tractable, this choice limits the shapes of posterior uncertainty that
    can be represented, especially when the true posterior is asymmetric, heavy-tailed, or
    multimodal. We propose Flow-Transformed Implicit Processes (FTIP), a variational
    inference method that makes this finite-dimensional function-space approximation more
    expressive. Instead of using a Gaussian distribution over the combination weights, FTIP
    uses a normalizing flow to define a richer variational distribution. This induces a
    flexible posterior distribution over functions while preserving tractable optimization.
    We train the model using a Black-Box &alpha; objective, allowing us to compare
    mass-covering and mode-seeking variational behaviour. Experiments show that FTIP
    captures asymmetric and multimodal posterior structure in function space that Gaussian
    coefficient approximations tend to smooth or collapse.
  tags: ["bayesian-dl", "inference", "implicit", "processes", "normalizing-flows"]
  labels: ["FTIP", "Implicit Processes", "Variational inference", "Preprint"]
  search: "flow transformed implicit processes function space variational inference ftip arxiv normalizing flows"
  accent: "oxblood"
  ongoing: true
