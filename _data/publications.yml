- id: "scalable-linearized-laplace"
  title: "Scalable Linearized Laplace Approximation via Surrogate Neural Kernel"
  year: "2026"
  authors: "Luis A. Ortega, Simon Rodriguez-Santana, Daniel Hernandez-Lobato"
  venue: "ESANN 2026 &middot; Spotlight talk"
  summary: |
    Learns a surrogate neural kernel to avoid large Jacobians while estimating uncertainty
    for pre-trained networks.
  abstract: |
    We introduce a scalable method to approximate the kernel of the Linearized Laplace
    Approximation (LLA). For this, we use a surrogate deep neural network (DNN) that learns
    a compact feature representation whose inner product replicates the Neural Tangent
    Kernel (NTK). This avoids the need to compute large Jacobians. Training relies solely on
    efficient Jacobian-vector products, allowing to compute predictive uncertainty on
    large-scale pre-trained DNNs. Experimental results show similar or improved uncertainty
    estimation and calibration compared to existing LLA approximations. Notwithstanding,
    biasing the learned kernel significantly enhances out-of-distribution detection. This
    remarks the benefits of the proposed method for finding better kernels than the NTK in
    the context of LLA to compute prediction uncertainty given a pre-trained DNN.
  tags: ["bayesian-dl", "inference", "code", "uncertainty", "ntk", "lla"]
  labels: ["LLA", "NTK", "Uncertainty", "Code"]
  search: "scalable linearized laplace approximation surrogate neural kernel esann spotlight bayesipy"
  accent: "oxblood"
  links:
